<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">
    <h2>Welcome back, {{ user.username }} 👋</h2>

    <!-- Search Bar -->
    <div class="row my-4">
        <div class="col-md-8 mx-auto">
            <form action="{% url 'search' %}" method="GET">
                <div class="input-group">
                    <input type="text" name="q" class="form-control form-control-lg"
                           placeholder="Search medicine name or generic name... (e.g. Napa)" required>
                    <button class="btn btn-primary btn-lg" type="submit">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <h4 class="mb-3">Popular Medicines</h4>
    <div class="row">
        {% for med in popular %}
        <div class="col-md-3 mb-4">
            <div class="card medicine-card h-100">
                {% if med.image %}
                    <img src="{{ med.image.url }}" class="card-img-top" style="height: 180px; object-fit: cover;">
                {% else %}
                    <img src="https://via.placeholder.com/300x180?text={{ med.name }}" class="card-img-top" style="height: 180px; object-fit: cover;">
                {% endif %}
                <div class="card-body">
                    <h5 class="card-title">{{ med.name }} <small>({{ med.strength }})</small></h5>
                    <p class="text-muted">{{ med.generic_name }}</p>
                    <p class="fw-bold text-primary">৳ {{ med.price }}</p>
                </div>
                <div class="card-footer bg-white">
                    <a href="{% url 'medicine_detail' med.slug %}" class="btn btn-outline-primary w-100">
                        View Details
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}

</body>
</html>
