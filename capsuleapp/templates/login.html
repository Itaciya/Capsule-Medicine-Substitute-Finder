{% extends 'base.html' %}
{% block content %}

<style>
    .auth-section {
        min-height: calc(100vh - 70px);
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f9fbf2 0%, #e8edd8 100%);
        padding-top: 90px;        /* Card is lower now */
        padding-bottom: 40px;
    }

    .auth-card {
        background: white;
        width: 100%;
        max-width: 460px;
        padding: 45px 40px;
        border-radius: 20px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
        border: 1px solid #e5e9d8;
    }

    .auth-title {
        text-align: center;
        font-size: 2.1rem;
        margin-bottom: 30px;
        color: #2d361c;
        font-weight: 700;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        color: #2d361c;
    }

    .form-control {
        padding: 12px 15px !important;
        border: 1px solid #ccc !important;
        border-radius: 6px !important;
    }

    .form-control:focus {
        border-color: #98a46d !important;
        box-shadow: 0 0 0 3px rgba(152, 164, 109, 0.2) !important;
    }

    .form-options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 15px 0 20px;
        font-size: 0.95rem;
    }

    .btn-signup {
        width: 100%;
        padding: 14px;
        background: #2d361c;
        color: white;
        border: none;
        border-radius: 50px;
        font-size: 1.1rem;
        font-weight: 600;
        margin-top: 10px;
    }

    .btn-signup:hover {
        background: #3e4b27;
    }

    .switch-auth {
        text-align: center;
        margin-top: 20px;
    }

    .switch-auth a {
        color: #98a46d;
        font-weight: 600;
    }
</style>

<section class="auth-section">
    <div class="auth-card">
        <h2 class="auth-title">Login to Capsule</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <div class="form-options">
                <label><input type="checkbox" name="remember"> Remember me</label>
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-signup">Login</button>
        </form>

        <p class="switch-auth">
            Don't have an account? <a href="{% url 'signup' %}">Sign Up</a>
        </p>
    </div>
</section>

{% endblock %}
