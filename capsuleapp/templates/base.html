<!DOCTYPE html>
<html lang="en">
{% load static %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Capsule{% if title %} - {{ title }}{% endif %}
    </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

        /* ====================== GLOBAL ====================== */
        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            background: #98a46d;
            color: #2d361c;
        }

        /* ====================== NAVBAR ====================== */
        .navbar-custom {

            background: linear-gradient(
                180deg,
                rgba(249, 251, 242, 0.97) 0%,
                rgba(152, 164, 109, 0.93) 100%
            ) !important;

            backdrop-filter: blur(12px);

            border-bottom: 1px solid rgba(255, 255, 255, 0.3);

            box-shadow: 0 4px 18px rgba(45, 54, 28, 0.15);

            padding: 10px 0;

            min-height: 72px;

            transition: all 0.35s ease;
        }

        /* NAVBAR HOVER */
        .navbar-custom:hover {
            box-shadow: 0 8px 28px rgba(45, 54, 28, 0.25);
        }

        /* NAVBAR SCROLL EFFECT */
        .navbar-custom {
    padding: 4px 0;
    min-height: 50px;
}
        .navbar .container {
    padding-left: 0;
}

        /* ====================== BRAND ====================== */
        .brand-wrapper {
            display: flex;
            align-items: center;
            text-decoration: none;

            gap: 0;
             margin-left: -300px;
        }
        .brand-wrapper:hover .logo-img {
    transform: scale(1.9);
}

        /* LOGO */
        .logo-img {
    height: 40px;
    width: auto;

    object-fit: contain;

    transform: scale(1.8); /* makes logo look bigger */

    transform-origin: left center;

    filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.12));

    transition: transform 0.3s ease;
}

        /* LOGO HOVER */


        /* BRAND TEXT */
        .navbar-brand-text {

            font-size: 2rem;

            font-weight: 800;

            color: #2d361c !important;

            letter-spacing: 1px;

            text-transform: uppercase;

            line-height: 1;

            margin-top: 2px;

            transition: all 0.3s ease;
        }

        /* TEXT HOVER */
        .brand-wrapper:hover .navbar-brand-text {
            color: #1a1f10 !important;
            letter-spacing: 2px;

        }

        /* ====================== NAV LINKS ====================== */
        .nav-link {
            color: #2d361c !important;

            font-weight: 600;

            margin-left: 22px;

            font-size: 1.02rem;

            position: relative;

            transition: all 0.3s ease;
        }

        /* NAV LINK HOVER */
        .nav-link:hover {
            color: #1a1f10 !important;
            transform: translateY(-2px);
        }

        /* UNDERLINE EFFECT */
        .nav-link::after {
            content: '';

            position: absolute;

            width: 0;

            height: 2px;

            bottom: -4px;

            left: 0;

            background-color: #2d361c;

            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* ====================== MOBILE ====================== */
       @media (max-width: 768px) {

    .logo-img {
        height: 70px;
        margin-right: -8px;
    }

    .navbar-brand-text {
        font-size: 1.7rem;
    }

    .nav-link {
        margin-left: 0;
        margin-top: 10px;
    }
}

    </style>
</head>

<body>

    <!-- ====================== NAVBAR ====================== -->
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top" id="navbar">

        <div class="container">

            <!-- BRAND -->
            <a href="/" class="brand-wrapper navbar-brand">

                <img
                    src="{% static 'images/logo.png' %}"
                    alt="Capsule Logo"
                    class="logo-img"
                >



            </a>

            <!-- MOBILE TOGGLER -->
            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
            >
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- NAV LINKS -->
            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            Home
                        </a>
                    </li>

                    {% if user.is_authenticated %}

                        <li class="nav-item">
                            <a class="nav-link" href="/dashboard">
                                Dashboard
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="/logout">
                                Logout
                            </a>
                        </li>

                    {% else %}

                        <li class="nav-item">
                            <a class="nav-link" href="/login">
                                Login
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="/signup">
                                Signup
                            </a>
                        </li>

                    {% endif %}

                </ul>

            </div>

        </div>

    </nav>

    <!-- ====================== PAGE CONTENT ====================== -->
    {% block content %}
    {% endblock %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- NAVBAR SCROLL EFFECT -->
    <script>

        const navbar = document.getElementById('navbar');

        window.addEventListener('scroll', () => {

            if (window.scrollY > 60) {

                navbar.classList.add('scrolled');

            } else {

                navbar.classList.remove('scrolled');

            }

        });

    </script>

</body>
</html>
